<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcelona</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
    <div class="logo">
        <h1>Barcelona</h1>
    </div>

    <nav class="menu">
        <a href="./index.html">Home</a>
        <a href="./dicas.html">Dicas</a>
        <a href="./curiosidades.html">Curiosidades</a>
        <a>|</a>
        <a href="./login.html">Login</a>
        <a href="./cadastro.html">Cadastro</a>
    </nav>
</header>

<section class="form-container">
    <div class="form-box">
        <h2>Login</h2>

        <input type="email" placeholder="E-mail" id="input_email_login">
        <input type="password" placeholder="Senha" id="input_senha_login">
        

        <button type="button" onclick="entrar()">Entrar</button>
        <div id="div_mensagem"></div>

        <p>Não tem conta? <a href="./cadastro.html">Cadastre-se</a></p>
    </div>
</section>
     
</body>
</html>
<script>

    function entrar(){

        let email = input_email_login.value
        let senha = input_senha_login.value

        if (!email.includes("@") || !email.includes(".com")) {
            div_mensagem.innerHTML = `⊗ Deve incluir um e-mail válido`
        } else {
            div_mensagem.innerHTML = `<br> Login efetuado com sucesso ✅`
        }

            fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: email,
                senhaServer: senha
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.idUsuario;
                    // sessionStorage.AQUARIOS = JSON.stringify(json.aquarios)

                    setTimeout(function () {
                        window.location = "quiz.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    // finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    
} 


   
</script>
