<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcelona</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
    <div class="logo">
        <h1>Dashboard</h1>
        <span>Além do que você imagina</span>
    </div>

    <nav class="menu">
        <a href="./index.html">Home</a>
        <a href="./dicas.html">Dicas</a>
        <a href="./curiosidades.html">Curiosidades</a>
        <a>|</a>
        <a href="./login.html">Login</a>
        <a href="./cadastro.html">Cadastro</a>
    </nav>
</header>

<!-- DASHBOARD -->
<section class="dashboard">

    <!-- BANNER -->
    <!-- <div class="dashboard-banner">
        <div class="overlay"></div>

        <div class="banner-text">
            <h1>Dashboard</h1>
            <p>Dados e informações para sua viagem</p>
        </div>
    </div> -->

    <!-- KPIs -->
    <div class="kpis">

        <div class="kpi azul">
            <h3>Turistas por ano</h3>
            <span>12,5M</span>
            <p>Alta movimentação</p>
        </div>

        <div class="kpi vermelho">
            <h3>Temperatura média</h3>
            <span>23°C</span>
            <p>No verão</p>
        </div>

        <div class="kpi roxo">
            <h3>Melhor época</h3>
            <span>Mai - Set</span>
            <p>Alta temporada</p>
        </div>

        <div class="kpi laranja">
            <h3>Avaliação média</h3>
            <span>4,8/5</span>
            <p>Baseado em turistas</p>
        </div>

    </div>

    <!-- GRÁFICOS -->
    <div class="graficos">

        <div class="grafico">
            <h3>Visitantes por mês</h3>
            <canvas id="graficoVisitantes"></canvas>
        </div>

        <div class="grafico">
            <h3>Temperatura ao longo do ano</h3>
            <canvas id="graficoTemperatura"></canvas>
        </div>

    </div>

</section>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
/* GRÁFICO 1 */
const ctx1 = document.getElementById('graficoVisitantes');

new Chart(ctx1, {
    type: 'bar',
    data: {
        labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'],
        datasets: [{
            label: 'Visitantes (milhões)',
            data: [3, 5, 7, 8, 10, 12, 13, 14, 11, 8, 5, 3],
            backgroundColor: '#3aa6b9'
        }]
    },
    options: {
        plugins: {
            legend: { display: false }
        }
    }
});

/* GRÁFICO 2 */
const ctx2 = document.getElementById('graficoTemperatura');

new Chart(ctx2, {
    type: 'line',
    data: {
        labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'],
        datasets: [{
            label: 'Temperatura',
            data: [8, 10, 13, 17, 21, 25, 28, 28, 25, 20, 15, 10],
            borderColor: '#f5a623',
            fill: false
        }]
    },
    options: {
        plugins: {
            legend: { display: false }
        }
    }
});
</script>

</body>
</html>


     
</body>
</html>
